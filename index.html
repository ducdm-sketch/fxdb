<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Game Analyzer — Creative Intelligence Platform</title>
  <meta name="description" content="AI Game Analyzer mock dashboard — creative analytics for mobile UA teams">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    /* Inline tweaks for shell chrome not worth a separate file */
    .sidebar-section { padding: 0 var(--space-3); }
  </style>
</head>
<body>

<div id="shell">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="assets/logo.svg" alt="AI Game Analyzer" height="24">
    </div>

    <!-- App selector -->
    <div class="sidebar-app-selector">
      <button class="app-selector-btn" id="app-selector-btn">
        <div class="app-icon">H</div>
        <span class="truncate">Homescapes</span>
        <span class="chevron">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </button>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

      <!-- Main -->
      <a class="nav-item" data-route="/overview" href="#/overview" data-label="Overview">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 9 12 2 21 9"/><path d="M9 22V12h6v10M3 9v13h18V9"/></svg>
        <span class="nav-label">Overview</span>
      </a>

      <a class="nav-item" data-route="/insights" href="#/insights" data-label="Insights">

        <span class="nav-label">Insights</span>
        <span class="nav-badge new">New</span>
      </a>

      <a class="nav-item" data-route="/performance" href="#/performance" data-label="Performance">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Performance</span>
      </a>

      <a class="nav-item" data-route="/gallery" href="#/gallery" data-label="Creative Gallery">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Creative Gallery</span>
      </a>

      <a class="nav-item" data-route="/tags" href="#/tags" data-label="Tags Performance">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span class="nav-label">Tags Performance</span>
      </a>

      <a class="nav-item" data-route="/deconstruction" href="#/deconstruction" data-label="Deconstruction">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
        <span class="nav-label">Deconstruction</span>
      </a>

      <a class="nav-item" data-route="/combinations" href="#/combinations" data-label="Combinations">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        <span class="nav-label">Combinations</span>
      </a>

      <a class="nav-item" data-route="/ai-studio" href="#/ai-studio" data-label="AI Studio">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg>
        <span class="nav-label">AI Studio</span>
        <span class="nav-badge new">NEW</span>
      </a>

      <a class="nav-item" data-route="/market" href="#/market" data-label="Market Insights">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span class="nav-label">Market Insights</span>
        <span class="nav-badge beta">Beta</span>
      </a>

      <a class="nav-item" data-route="/reporting" href="#/reporting" data-label="Reporting">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="nav-label">Reporting</span>
      </a>

      <div class="nav-divider"></div>

      <!-- Secondary -->
      <a class="nav-item" href="https://www.aigameanalyzer.io/blog/introducing-ai-game-analyzer-api-unlock-the-potential-of-your-creatives" target="_blank" rel="noopener">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span class="nav-label">API Docs</span>
        <span class="nav-badge external">↗</span>
      </a>

      <a class="nav-item" href="#" onclick="Components.showToast('Settings coming soon', 'default'); return false;">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="nav-label">Settings</span>
      </a>

    </nav>

    <!-- User -->
    <div class="sidebar-footer">
      <div class="sidebar-user" id="user-menu-btn">
        <div class="user-avatar">DN</div>
        <div class="user-info">
          <div class="user-name">Duc N.</div>
          <div class="user-role">UA Manager</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--color-text-muted);flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

  </aside>

  <!-- ── Main ──────────────────────────────────────────────── -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">

      <!-- Page title -->
      <span id="topbar-page-title" class="topbar-page-title">Overview</span>
      <span id="topbar-app-badge" style="font-size:var(--text-xs);font-weight:600;padding:2px 8px;background:var(--color-primary-light);color:var(--color-primary);border-radius:var(--radius-full);margin-left:8px">Homescapes</span>

      <div class="topbar-spacer"></div>

      <!-- Date range -->
      <button class="date-range-btn" id="date-range-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="date-range-label">Jan 1 – Feb 28, 2026</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      <!-- Notifications -->
      <button class="topbar-icon-btn" id="notifications-btn" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>

      <!-- What's New -->
      <button class="btn btn-secondary btn-sm" id="whats-new-btn" style="margin-left:8px">What's New</button>

    </header>

    <!-- App content -->
    <main id="app">
      <!-- Views render here -->
    </main>

  </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- ── Scripts ──────────────────────────────────────────── -->
<!-- Data -->
<script src="js/data.js"></script>
<!-- Utilities -->
<script src="js/router.js"></script>
<script src="js/components.js"></script>
<script src="js/charts.js"></script>
<!-- Views -->
<script src="js/views/insights.js"></script>
<script src="js/views/overview.js"></script>
<script src="js/views/performance.js"></script>
<script src="js/views/gallery.js"></script>
<script src="js/views/tags-performance.js"></script>
<script src="js/views/deconstruction.js"></script>
<script src="js/views/combinations.js"></script>
<script src="js/views/ai-studio.js"></script>
<script src="js/views/market-insights.js"></script>
<script src="js/views/reporting.js"></script>

<script>
  // ── Bootstrap ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {

    // Apply Chart.js defaults
    Charts.applyDefaults();

    // Register routes
    Router.register('/overview',       params => ViewOverview(params));
    Router.register('/insights',       params => window['View_insights'](params));
    Router.register('/performance',    params => window['View_performance'](params));
    Router.register('/gallery',        params => window['View_gallery'](params));
    Router.register('/tags',           params => window['View_tags-performance'](params));
    Router.register('/deconstruction', params => window['View_deconstruction'](params));
    Router.register('/combinations',   params => window['View_combinations'](params));
    Router.register('/ai-studio',      params => window['View_ai-studio'](params));
    Router.register('/market',         params => window['View_market-insights'](params));
    Router.register('/reporting',      params => window['View_reporting'](params));

    // Start router
    Router.init();

    // ── App selector dropdown ─────────────────────────────
    document.getElementById('app-selector-btn')?.addEventListener('click', function (e) {
      e.stopPropagation();
      const apps = ['Homescapes', 'Gardenscapes', 'My Game'];
      Components.showDropdown(this, apps.map(a => ({
        label: a,
        active: AIGameAnalyzerData.AppState.activeApp === a,
      })).concat([
        { divider: true },
        { label: '+ Add app' }
      ]), item => {
        if (!item.label || item.label === '+ Add app') {
          Components.showToast('Add app — feature coming soon', 'default');
          return;
        }
        AIGameAnalyzerData.AppState.activeApp = item.label;
        this.querySelector('.truncate').textContent = item.label;
        this.querySelector('.app-icon').textContent = item.label[0].toUpperCase();
        
        const badge = document.getElementById('topbar-app-badge');
        if (badge) badge.textContent = item.label;

        const counts = { Homescapes: 23, Gardenscapes: 9, 'My Game': 6 }; // Including AI creatives
        Components.showToast(`Switched to ${item.label} — ${counts[item.label] || '?'} creatives`, 'default', 2200);
        Router.reload();
      });
    });

    // ── Date range picker ─────────────────────────────────
    const dateRanges = [
      { label: 'Last 7 days', value: 'Last 7 days' },
      { label: 'Last 30 days', value: 'Last 30 days' },
      { label: 'Jan 1 – Feb 28, 2026', value: 'Jan 1 – Feb 28, 2026', active: true },
      { label: 'Nov 1 – Dec 31, 2025', value: 'Nov 1 – Dec 31, 2025' },
      { label: 'Custom range…', value: 'custom' },
    ];
    document.getElementById('date-range-btn')?.addEventListener('click', function (e) {
      e.stopPropagation();
      Components.showDropdown(this, dateRanges, item => {
        if (item.value === 'custom') {
          Components.showToast('Custom date picker — coming soon', 'default');
          return;
        }
        document.getElementById('date-range-label').textContent = item.label;
        AIGameAnalyzerData.AppState.dateRange = item.label;
        Components.showToast(`Date range: ${item.label}`, 'default', 1800);
        Router.reload();
      });
    });

    // ── Notifications dropdown ────────────────────────────
    document.getElementById('notifications-btn')?.addEventListener('click', function(e) {
      e.stopPropagation();
      Components.showDropdown(this, [
        { label: 'cr-020 IPM dropped 18% in 24h' },
        { label: 'AI Studio: generation complete' },
        { label: 'Weekly report ready to download' },
      ], item => {
        Components.showToast(item.label, 'default', 2500);
      });
    });

    // ── What's New dropdown ───────────────────────────────
    document.getElementById('whats-new-btn')?.addEventListener('click', function(e) {
      e.stopPropagation();
      Components.showDropdown(this, [
        { label: '✦ AI Studio — generate video & playable ads' },
        { label: '↗ Export to 14 ad network formats' },
        { label: '⚡ Performance alerts now real-time' },
      ], item => {
        Components.showToast(item.label, 'default', 2500);
      });
    });

    // ── User menu ─────────────────────────────────────────
    document.getElementById('user-menu-btn')?.addEventListener('click', function (e) {
      e.stopPropagation();
      Components.showDropdown(this, [
        { label: 'Profile settings' },
        { label: 'Team management' },
        { divider: true },
        { label: 'Sign out' },
      ], item => {
        Components.showToast(`${item.label} — coming soon`, 'default');
      });
    });

  });
</script>

</body>
</html>
